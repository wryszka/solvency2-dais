command: ["python", "-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
env:
  - name: CATALOG_NAME
    value: ${var.catalog_name}
  - name: SCHEMA_NAME
    value: ${var.schema_name}
  - name: WAREHOUSE_ID
    value: ${var.warehouse_id}
  - name: APP_DISPLAY_NAME
    value: ${var.app_display_name}
  - name: DASHBOARD_ID
    value: ${var.dashboard_id}
  - name: GENIE_SPACE_ID
    value: ${var.genie_space_id}
  - name: BACKSTAGE_NOTEBOOK_PATH
    value: ${var.backstage_notebook_path}
  - name: PRICING_APP_URL
    value: ${var.pricing_app_url}
  - name: AI_GATEWAY_ENDPOINT
    value: ""
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
